<svg width="160" height="160" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">

<style>
.cube:hover{
transform: rotate(8deg);
transform-origin:center;
transition:0.3s;
}
</style>

<g class="cube">

<polygon points="60,15 100,40 60,65 20,40" fill="#ff6a00"></polygon>

<polygon points="20,40 60,65 60,105 20,80" fill="#000"></polygon>

<polygon points="100,40 60,65 60,105 100,80" fill="#ff8c42"></polygon>

</g>

</svg>